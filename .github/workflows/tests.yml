name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  format:
    if: ${{ !startsWith(github.event.head_commit.message, '[DOC]') }}
    runs-on: ubuntu-latest
    continue-on-error: true
    name: Format check
    steps:
      - name: Checkout extension
        uses: actions/checkout@v6
        with:
          path: opcua-client-ext-transport-pubsub

      - name: Checkout core (sibling path dependency)
        uses: actions/checkout@v6
        with:
          repository: php-opcua/opcua-client
          ref: master
          path: opcua-client

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: openssl, sockets
          coverage: none

      - name: Install Composer dependencies
        working-directory: opcua-client-ext-transport-pubsub
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        working-directory: opcua-client-ext-transport-pubsub
        run: composer format:check

  unit:
    if: ${{ !cancelled() && !startsWith(github.event.head_commit.message, '[DOC]') }}
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    name: Unit — PHP ${{ matrix.php-version }} (${{ matrix.os }})

    steps:
      - name: Checkout extension
        uses: actions/checkout@v6
        with:
          path: opcua-client-ext-transport-pubsub

      - name: Checkout core (sibling path dependency)
        uses: actions/checkout@v6
        with:
          repository: php-opcua/opcua-client
          ref: master
          path: opcua-client

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sockets
          coverage: none

      - name: Install Composer dependencies
        working-directory: opcua-client-ext-transport-pubsub
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        working-directory: opcua-client-ext-transport-pubsub
        run: vendor/bin/pest --exclude-group=integration

  integration:
    if: ${{ !startsWith(github.event.head_commit.message, '[DOC]') }}
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    name: Integration — PHP ${{ matrix.php-version }}

    steps:
      - name: Checkout extension
        uses: actions/checkout@v6
        with:
          path: opcua-client-ext-transport-pubsub

      - name: Checkout core (sibling path dependency)
        uses: actions/checkout@v6
        with:
          repository: php-opcua/opcua-client
          ref: master
          path: opcua-client

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: openssl, sockets
          coverage: ${{ matrix.php-version == '8.5' && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        working-directory: opcua-client-ext-transport-pubsub
        run: composer install --no-interaction --prefer-dist

      - name: Start OPC UA test servers + PubSub publisher
        id: opcua
        uses: php-opcua/uanetstandard-test-suite@v1.5.1

      - name: Run integration tests
        working-directory: opcua-client-ext-transport-pubsub
        env:
          OPCUA_CERTS_DIR: ${{ steps.opcua.outputs.certs-dir }}
          OPCUA_PUBSUB_INTERFACE: '0.0.0.0'
        run: vendor/bin/pest --group=integration --log-junit=results/junit.xml ${{ matrix.php-version == '8.5' && '--coverage-clover=coverage/clover.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.5'
        uses: codecov/codecov-action@v6
        with:
          files: opcua-client-ext-transport-pubsub/coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: opcua-client-ext-transport-pubsub/results/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: test-results
          disable_search: true

      - name: UA-.NETStandard server logs (on failure)
        if: failure()
        working-directory: .uanetstandard-test-suite
        run: docker compose logs --tail=100
